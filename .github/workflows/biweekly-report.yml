name: Biweekly Literature Report

on:
  schedule:
    # Run every Monday; workflow itself gates to biweekly execution.
    - cron: "15 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide whether to run this week
        id: biweekly
        shell: bash
        run: |
          week_num="$(date -u +%V)"
          if (( 10#$week_num % 2 == 0 )); then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Even ISO week ($week_num). Continue."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Odd ISO week ($week_num). Skip this run."
          fi

      - name: Install dependencies
        if: steps.biweekly.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Inject optional API keys into config
        if: steps.biweekly.outputs.run == 'true'
        shell: bash
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [[ -n "$SEMANTIC_SCHOLAR_API_KEY" ]]; then
            sed -i "s|^    api_key: \"\"$|    api_key: \"$SEMANTIC_SCHOLAR_API_KEY\"|" config.yaml
          fi
          if [[ -n "$OPENROUTER_API_KEY" ]]; then
            sed -i "s|^  api_key: \"\"$|  api_key: \"$OPENROUTER_API_KEY\"|" config.yaml
          fi

      - name: Generate report
        if: steps.biweekly.outputs.run == 'true'
        run: python main.py

      - name: Commit report changes
        if: steps.biweekly.outputs.run == 'true'
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain reports/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add reports/
            git commit -m "chore: update biweekly literature report"
            git push
          else
            echo "No report changes to commit."
          fi